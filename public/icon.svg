<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00cc4c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#009933;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="120" fill="#050505" />
  <!-- Inner Glow -->
  <rect x="10" y="10" width="492" height="492" rx="110" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="2" />
  <!-- Main "K" Shape -->
  <g transform="translate(120, 100) scale(1.4)">
    <path d="M40 0 H100 V220 H40 Z" fill="url(#grad)" />
    <path d="M90 110 L200 0 H260 L140 110 L260 220 H200 Z" fill="url(#grad)" />
  </g>
</svg>
