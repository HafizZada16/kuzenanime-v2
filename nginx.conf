events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html index.htm;

        # Serve static assets with cache headers
        location ~* \.(js|css|png|svg|jpg|jpeg|gif|ico|webp|woff2|woff|ttf|pdf|txt|xml|map)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Special handling for HTML files to prevent them from being treated as routes
        location ~* \.html$ {
            expires -1;
        }

        # Handle API routes if present (optional)
        # location /api {
        #     # Proxy to backend service if needed
        # }

        # Main location - handles client-side routing for SPA
        location / {
            # Check if the requested file exists as a file or directory
            if (!-e $request_filename) {
                # If not, serve index.html for client-side routing
                rewrite ^(.*)$ /index.html last;
                break;
            }
        }
    }
}